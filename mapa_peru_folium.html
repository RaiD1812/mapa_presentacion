// Variables para grupos de capas submarinas
var feature_group_submarino_puntos = L.featureGroup();
var feature_group_submarino_conexiones = L.featureGroup();

// Función para cargar datos submarinos desde JSON (API: submarinecablemap.com)
function loadSubmarineData() {
    Promise.all([
        fetch('puntos_latam.json').then(r => r.json()),
        fetch('cables_latam.json').then(r => r.json())
    ])
    .then(([puntosData, cablesData]) => {
        // Función para extraer coordenadas (maneja MultiLineString y LineString)
        function getAllCoords(geom) {
            if (geom.type === 'MultiLineString') {
                return geom.coordinates.flat();
            } else if (geom.type === 'LineString') {
                return geom.coordinates;
            }
            return [];
        }
        
        // Colores para cada cable
        var cableColors = {
            'Fibra Optica': '#e53935',
            'SPCS': '#1976d2',
            'Mistral': '#1976d2',
            'PAC': '#ff9800',
            'SAm-1': '#43a047',
            'SAC': '#9c27b0',
            'SACS': '#795548',
            'AMX-1': '#00bcd4',
            'default': '#1976d2'
        };
        
        function getCableColor(name) {
            for (var key in cableColors) {
                if (name.indexOf(key) !== -1) return cableColors[key];
            }
            return cableColors.default;
        }
        
        // Cargar puntos de landing
        puntosData.features.forEach(pt => {
            var coords = pt.geometry.coordinates;
            var name = pt.properties.name || 'Unknown';
            
            var marker = L.circleMarker([coords[1], coords[0]], {
                radius: 5,
                color: '#1976d2',
                fillColor: '#42a5f5',
                fillOpacity: 0.8,
                weight: 2
            });
            
            marker.bindPopup('<b>' + name + '</b>');
            feature_group_submarino_puntos.addLayer(marker);
        });
        
        // Cargar cables
        cablesData.features.forEach(cable => {
    var geometry = cable.geometry;
    var name = cable.properties.name || 'Unknown cable';
    var color = getCableColor(name);

    if (geometry.type === "MultiLineString") {
        geometry.coordinates.forEach(segment => {
            var latlngs = segment.map(c => [c[1], c[0]]);
            
            var polyline = L.polyline(latlngs, {
                color: color,
                weight: 3,
                opacity: 0.8
            });

            polyline.bindPopup('<b>' + name + '</b>');
            feature_group_submarino_conexiones.addLayer(polyline);
        });
    }

    if (geometry.type === "LineString") {
        var latlngs = geometry.coordinates.map(c => [c[1], c[0]]);
        
        var polyline = L.polyline(latlngs, {
            color: color,
            weight: 3,
            opacity: 0.8
        });

        polyline.bindPopup('<b>' + name + '</b>');
        feature_group_submarino_conexiones.addLayer(polyline);
    }
});
         
        console.log('Submarine data loaded:', puntosData.features.length, 'points,', cablesData.features.length, 'cables');
    })
.catch(err => console.error('Error cargando datos submarinos:', err));
}

            // --- AGREGADO: Cargar y resaltar límites y departamentos ---
            // Función para cargar un GeoJSON externo y agregarlo al mapa con estilo
            function addGeoJsonLayer(url, style, name, addToMap = true) {
                fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        const layer = L.geoJson(data, {style: style});
                        if (addToMap) layer.addTo(map_38573244cbba57c1a7c85eada678cca5);
                        if (layer_control_caff4da852b646899c9f35dd3d3955f1) {
                            layer_control_caff4da852b646899c9f35dd3d3955f1.addOverlay(layer, name);
                        }
                    });
            }


            // Estilo para los límites nacionales (frontera) - negro, delgado

            const fronteraStyle = {
                color: '#000', // negro
                weight: 2,
                opacity: 1,
                fill: false
            };

            // Estilo para los departamentos - gris

            const departamentosStyle = {
                color: '#888', // gris
                weight: 1,
                opacity: 0.9,
                fill: false
            };

            // Agregar capas al mapa
            addGeoJsonLayer('peru_frontera.geojson', fronteraStyle, 'Límite Nacional');
            addGeoJsonLayer('peru_departamentos.geojson', departamentosStyle, 'Departamentos');
