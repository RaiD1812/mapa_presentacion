<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa interactivo - Red DWDM Perú</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        p {
            color: #a0a0a0;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        
        .btn-abrir {
            background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(229, 57, 53, 0.4);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        
        .btn-abrir:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(229, 57, 53, 0.5);
        }
        
        .btn-abrir i {
            font-size: 1.4rem;
        }
        
        .info {
            margin-top: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: left;
        }
        
        .info h3 {
            color: #fff;
            font-size: 1rem;
            margin-bottom: 12px;
        }
        
        .info ul {
            color: #b0b0b0;
            font-size: 0.9rem;
            line-height: 1.8;
            padding-left: 20px;
        }
        
        .info li span {
            color: #4fc3f7;
            font-weight: 600;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 0.9rem;
        }
        
        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
        
        .legend-line {
            width: 25px;
            height: 3px;
            border-radius: 2px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-network-wired"></i> Red DWDM Perú</h1>
        <p>Mapa Red de FO Dorsal</p>
        
        <button class="btn-abrir" onclick="abrirMapa()">
            <i class="fas fa-external-link-alt"></i>
            Abrir Mapa
        </button>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background: #e53935;"></div>
                <span>Dorsales</span>
            </div>
            <div class="legend-item">
                <div class="legend-line" style="background: #e53935;"></div>
                <span>Fibra Claro</span>
            </div>
        </div>
        
    </div>
    
    <script>
        function abrirMapa() {
            window.location.href = 'mapa_peru_folium.html';
        }
    </script>
</body>
</html>
